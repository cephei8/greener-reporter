name: Release

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        type: string
      prerelease:
        description: "Create as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  release_build_validate:
    name: Validate release
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Validate pre-release tag format
        if: inputs.prerelease == true
        run: |
          TAG="${{ inputs.release_tag }}"
          if ! echo "$TAG" | grep -qE -- '-(alpha|beta|rc|pre|preview|dev|nightly)'; then
            echo "Error: Pre-release tag must contain a suffix like -alpha, -beta, -rc1, etc."
            echo "  Examples: v1.0.0-beta, v2.0.0-rc1, v1.5.0-alpha.1"
            echo "  Your tag: $TAG"
            exit 1
          fi
          echo "Pre-release tag format is valid: $TAG"

