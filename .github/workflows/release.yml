name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        type: string
      prerelease:
        description: "Create as pre-release"
        required: false
        type: boolean
        default: false

env:
  TARGETS: "x86_64-linux-gnu aarch64-linux-gnu x86_64-windows-msvc x86_64-macos aarch64-macos"

jobs:
  release_build_validate:
    name: Validate release
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Validate pre-release tag format
        if: inputs.prerelease == true
        run: |
          TAG="${{ inputs.release_tag }}"
          if ! echo "$TAG" | grep -qE -- '-(alpha|beta|rc|pre|preview|dev|nightly)'; then
            echo "Error: Pre-release tag must contain a suffix like -alpha, -beta, -rc1, etc."
            echo "  Examples: v1.0.0-beta, v2.0.0-rc1, v1.5.0-alpha.1"
            echo "  Your tag: $TAG"
            exit 1
          fi
          echo "Pre-release tag format is valid: $TAG"

  release_build:
    name: Build libraries
    runs-on: ubuntu-latest
    needs: release_build_validate

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          docker build \
            --build-arg TARGETS="${{ env.TARGETS }}" \
            -t greener-reporter-zig:all \
            .

      - name: Extract libraries from container
        run: |
          docker run --name zig-builder greener-reporter-zig:all
          docker cp zig-builder:/output/. ./zig-libs/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: zig-libs-all
          path: zig-libs/
          if-no-files-found: error
          retention-days: 1

  release_build_rs:
    name: (Release) Build and test for ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    needs: release_build

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target_name: "x86_64-linux-gnu"
          - os: ubuntu-24.04-arm
            target_name: "aarch64-linux-gnu"
          - os: windows-latest
            target_name: "x86_64-windows-msvc"
          - os: macos-15-intel
            target_name: "x86_64-macos"
          - os: macos-15
            target_name: "aarch64-macos"

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Download Zig libs
        uses: actions/download-artifact@v6
        with:
          name: zig-libs-all
          path: zig-libs

      - name: Copy Zig libs to output directory
        run: |
          mkdir -p ./zig-out/lib
          cp -r zig-libs/${{ matrix.target_name }}/* ./zig-out/lib/

      - name: Build Rust part
        run: cargo build --release

      - if: runner.os == 'macOS'
        name: Fix rpath
        run: |
          install_name_tool -id @rpath/libgreener_servermock.dylib target/release/libgreener_servermock.dylib

      - name: Copy lib files
        run: |
          cp zig-out/lib/* tests-ffi/
          cp zig-out/lib/* target/release/

      - if: runner.os == 'macOS'
        name: Copy lib files (macOS)
        run: cp target/release/libgreener_servermock.dylib tests-ffi/

      - if: runner.os == 'Linux'
        name: Copy lib files (Linux)
        run: cp target/release/libgreener_servermock.so tests-ffi/

      - if: runner.os == 'Windows'
        name: Copy lib files (Windows)
        run: |
          cp target/release/greener_servermock.dll tests-ffi/
          cp target/release/greener_servermock.dll.lib target/release/greener_servermock.lib

      - name: Run Rust tests
        run: cargo test --release -- --nocapture

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.25"

      - name: Run tests
        run: go test
        working-directory: tests-ffi

      - name: Create release tar directories
        run: |
          mkdir -p release_tar/reporter
          mkdir -p release_tar/servermock

      - if: runner.os == 'Windows'
        name: Prepare greener_reporter (Zig) release tar
        run: |
          cp zig-out/lib/greener_reporter.dll release_tar/reporter
          cp zig-out/lib/greener_reporter.lib release_tar/reporter

      - if: runner.os == 'macOS'
        name: Prepare greener_reporter (Zig) release tar
        run: |
          cp zig-out/lib/libgreener_reporter.dylib release_tar/reporter

      - if: runner.os == 'Linux'
        name: Prepare greener_reporter (Zig) release tar
        run: |
          cp zig-out/lib/libgreener_reporter.so release_tar/reporter

      - if: runner.os == 'Windows'
        name: Prepare servermock (Rust) release tar
        run: |
          cp target/release/greener_servermock.dll release_tar/servermock
          cp target/release/greener_servermock.lib release_tar/servermock

      - if: runner.os == 'macOS'
        name: Prepare servermock (Rust) release tar
        run: |
          cp target/release/libgreener_servermock.dylib release_tar/servermock

      - if: runner.os == 'Linux'
        name: Prepare servermock (Rust) release tar
        run: |
          cp target/release/libgreener_servermock.so release_tar/servermock

      - name: Create release tars
        run: |
          tar -czf greener-reporter-lib-${{ matrix.target_name }}.tar.gz -C release_tar/reporter .
          tar -czf greener-servermock-lib-${{ matrix.target_name }}.tar.gz -C release_tar/servermock .

      - uses: actions/upload-artifact@v5
        with:
          name: greener-reporter-lib-${{ matrix.target_name }}.tar.gz
          path: greener-reporter-lib-${{ matrix.target_name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v5
        with:
          name: greener-servermock-lib-${{ matrix.target_name }}.tar.gz
          path: greener-servermock-lib-${{ matrix.target_name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release_create:
    name: (Release) Create release
    needs: release_build_rs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          name: greener-reporter-lib-x86_64-linux-gnu.tar.gz
          path: ./release_tars
      - uses: actions/download-artifact@v6
        with:
          name: greener-servermock-lib-x86_64-linux-gnu.tar.gz
          path: ./release_tars

      - uses: actions/download-artifact@v6
        with:
          name: greener-reporter-lib-aarch64-linux-gnu.tar.gz
          path: ./release_tars
      - uses: actions/download-artifact@v6
        with:
          name: greener-servermock-lib-aarch64-linux-gnu.tar.gz
          path: ./release_tars

      - uses: actions/download-artifact@v6
        with:
          name: greener-reporter-lib-x86_64-windows-msvc.tar.gz
          path: ./release_tars
      - uses: actions/download-artifact@v6
        with:
          name: greener-servermock-lib-x86_64-windows-msvc.tar.gz
          path: ./release_tars

      - uses: actions/download-artifact@v6
        with:
          name: greener-reporter-lib-x86_64-macos.tar.gz
          path: ./release_tars
      - uses: actions/download-artifact@v6
        with:
          name: greener-servermock-lib-x86_64-macos.tar.gz
          path: ./release_tars

      - uses: actions/download-artifact@v6
        with:
          name: greener-reporter-lib-aarch64-macos.tar.gz
          path: ./release_tars
      - uses: actions/download-artifact@v6
        with:
          name: greener-servermock-lib-aarch64-macos.tar.gz
          path: ./release_tars

      - name: Create include tars
        working-directory: release_tars
        run: |
          tar -czf greener-reporter-include.tar.gz -C ../include greener_reporter
          tar -czf greener-servermock-include.tar.gz -C ../include greener_servermock

      - name: Create release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create ${{ inputs.release_tag }} $PRERELEASE_FLAG ./release_tars/*
        env:
          GH_TOKEN: ${{ github.token }}
